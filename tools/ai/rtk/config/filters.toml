# RTK filters
schema_version = 1

[filters.bats]
description = "bats TAP output — show failures only"
match_command = "^bats\\b"
strip_ansi = true
strip_lines_matching = ["^ok \\d+", "^\\d+\\.\\.\\d+"]
on_empty = "All tests passed."

[filters.yarn]
description = "yarn run test (Vitest) output — show failures only"
match_command = "^yarn run test\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s+RUN\\s",
  "^\\s+✓",
  "^\\s+Start at\\s",
  "^\\s+Duration\\s",
  "^✘ Tests are failing",
  "^\\s*(Test Files|Tests)\\s+\\d+ passed",
]
on_empty = "All tests passed."

[filters.pytest]
description = "pytest output — show failures only"
match_command = "^python-test( |$)"
strip_ansi = true
strip_lines_matching = [
  "^=+ test session starts",
  "^platform ",
  "^rootdir:",
  "^configfile:",
  "^plugins:",
  "^collected \\d+",
  "\\[\\d+%\\]$",
  " PASSED$",
  "^=+ \\d+ passed in",
  "^.+\\.py:\\s*$",
  "^\\s+✓",
]
on_empty = "All tests passed."
