<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kitty Color Palette — Tailwind Reference</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #1a1a2e;
        color: #e0e0e0;
        font-family: 'Courier New', Courier, monospace;
        font-size: 12px;
        padding: 24px;
      }
      h1 {
        font-size: 18px;
        font-weight: bold;
        color: #a0c4ff;
        margin-bottom: 24px;
        letter-spacing: 1px;
      }
      h2 {
        font-size: 11px;
        font-weight: bold;
        color: #7f8fa6;
        margin: 20px 0 8px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      /* ── Standard terminal section ── */
      .terminal-block {
        margin-bottom: 6px;
      }
      .terminal-pair-row {
        display: flex;
        gap: 4px;
        margin-bottom: 4px;
      }
      .terminal-custom-row {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
      }
      .named-swatch {
        width: 78px;
        height: 52px;
        border-radius: 4px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 4px 5px;
        cursor: default;
        border: 2px solid rgba(255, 255, 255, 0.25);
      }
      .named-swatch .ansi {
        font-size: 11px;
        font-weight: bold;
      }
      .named-swatch .label {
        font-size: 9px;
        opacity: 0.85;
      }
      .named-swatch .hex {
        font-size: 9px;
        font-weight: bold;
      }

      /* ── Palette families ── */
      .palette-row {
        display: flex;
        align-items: center;
        margin-bottom: 5px;
        gap: 3px;
      }
      .family-label {
        width: 68px;
        min-width: 68px;
        font-size: 10px;
        color: #9ca3af;
        text-align: right;
        padding-right: 8px;
        font-weight: bold;
        letter-spacing: 0.5px;
        line-height: 1.4;
      }
      .swatch {
        width: 78px;
        height: 60px;
        border-radius: 4px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 4px 5px;
        cursor: default;
        transition: transform 0.1s;
      }
      .swatch:hover {
        transform: scale(1.06);
        z-index: 10;
        position: relative;
      }
      .swatch .ansi {
        font-size: 13px;
        font-weight: bold;
        line-height: 1;
      }
      .swatch .shade {
        font-size: 9px;
        opacity: 0.85;
        line-height: 1.2;
      }
      .swatch .hex {
        font-size: 9px;
        font-weight: bold;
        line-height: 1;
      }

      .swatch {
        border: 2px solid rgba(255, 255, 255, 0.2);
      }
      .border-unused {
        border: 2px dashed rgba(255, 255, 255, 0.12);
      }
      .swatch-unused {
        opacity: 0.35;
        background: #1a1f2e !important;
      }
      /* terminal anchor: shade-0 (black) and shade-1 (white) of gray family */
      .swatch-term-anchor {
        border: 2px solid rgba(255, 215, 0, 0.7) !important;
      }

      .dark {
        color: #111;
      }
      .light {
        color: #fff;
      }
    </style>
    <script>
      function textClass(hex) {
        const r = parseInt(hex.slice(1, 3), 16) / 255;
        const g = parseInt(hex.slice(3, 5), 16) / 255;
        const b = parseInt(hex.slice(5, 7), 16) / 255;
        const L = (c) =>
          c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
        const lum = 0.2126 * L(r) + 0.7152 * L(g) + 0.0722 * L(b);
        return lum > 0.179 ? 'dark' : 'light';
      }
    </script>
  </head>

        { slot: 4, hex: '#3182ce', label: 'blue' },
        { slot: 5, hex: '#805ad5', label: 'purple' },
        { slot: 6, hex: '#0891b2', label: 'cyan' },

      const ALT_COLORED = [
        { slot: 9, hex: '#db2777', label: 'pink', alt: 'alt.red' },
        { slot: 10, hex: '#65a30d', label: 'lime', alt: 'alt.green' },
        { slot: 11, hex: '#ea580c', label: 'orange', alt: 'alt.yellow' },
        { slot: 12, hex: '#4f46e5', label: 'indigo', alt: 'alt.blue' },
        { slot: 13, hex: '#c026d3', label: 'fuchsia', alt: 'alt.purple' },
        { slot: 14, hex: '#0d9488', label: 'teal', alt: 'alt.cyan' },

      // Neutral terminal slots (achromatic: black, white, gray, stone)
      const NEUTRAL_TERMINAL = [
        { slot: 0, hex: '#0c0f15', label: 'black' },
        { slot: 7, hex: '#ffffff', label: 'white' },
        { slot: 8, hex: '#4b5563', label: 'gray' },
        { slot: 15, hex: '#57534e', label: 'stone' },
      ];

      function makeNamed(data, container) {
        data.forEach(({ slot, hex, label, alt }) => {
          const cls = textClass(hex);
          const el = document.createElement('div');
          el.className = `named-swatch ${cls}`;
          el.style.background = hex;
          el.title = `color${slot}  ${hex}  (${label}${alt ? ' / ' + alt : ''})`;
          el.innerHTML = `<span class="ansi">${slot}</span><span class="label">${label}${alt ? '<br><span style="font-size:8px;opacity:0.7">' + alt + '</span>' : ''}</span><span class="hex">${hex}</span>`;
          container.appendChild(el);
        });
      }

      makeNamed(BASE_COLORED, document.getElementById('row-colored-base'));
      makeNamed(ALT_COLORED, document.getElementById('row-colored-alt'));
      makeNamed(
        NEUTRAL_TERMINAL,

      );

        { name: '?', start: 180, group: 'unused-bonus', count: 10 },

        // ── Neutral ──
        // gray: achromatic axis — shade-0=terminal-black, shade-1=terminal-white, shades 2-9=TW-200→900, canonical=shade-5 (#6b7280)

            '900',
          ],
          anchorShades: [0, 1],
        },
        // slate, neutral, stone: standard convention (shade-0=near-black bg, shades 1-9=TW-200→950). No white anchor.
        // Note: gray is the exception — its shade-0/1 are terminal black/white anchors, not the standard convention.
        {
          name: 'slate',
          start: 210,

          shades: [
            '#0f141e',

        },
        // stone: slot 15 canonical = shade 5 (#57534e) — emphasis text
        {

          start: 230,

        { name: '?', start: 250, group: 'unused-neutral', count: 6 },

      const TW_SHADES = [
        'dark/bg',
        '200',
        '300',
        '400',
        '500',
        '600',
        '700',
        '800',
        '900',
        '950',
      ];

      const GROUP_LABELS = {
        primary: 'Primary — base terminal colors',
        secondary: 'Secondary — base color alternatives',
        bonus: 'Bonus — neither primary nor secondary',
        'unused-bonus': 'Free buffer — 2 future families (slots 180–199)',
      };
      const familiesEl = document.getElementById('families');
      const familiesNeutralEl = document.getElementById('families-neutral');
      let currentGroup = null;
      FAMILIES.forEach(
        ({
          name,
          start,
          group,
          shades,
          twShades: familyTwShades,
          anchorShades,
          count,
        }) => {
          const isNeutral = group === 'neutral' || group === 'unused-neutral';
          const container = isNeutral ? familiesNeutralEl : familiesEl;

          if (group !== currentGroup) {
            currentGroup = group;
            const label = GROUP_LABELS[group];
            if (label) {
              const h = document.createElement('h2');
              h.textContent = label;
              h.style.marginTop = '20px';
              if (group === 'unused-bonus') h.style.color = '#374151';
              container.appendChild(h);
            }
          }

          // Unused placeholder rows
          if (group === 'unused-bonus' || group === 'unused-neutral') {
            const row = document.createElement('div');
            row.className = 'palette-row';
            const lbl = document.createElement('div');
            lbl.className = 'family-label';
            lbl.style.color = '#374151';
            lbl.textContent = '—';
            row.appendChild(lbl);
            const n = count || 10;
            for (let i = 0; i < n; i++) {
              const slot = start + i;
              const el = document.createElement('div');
              el.className = 'swatch light swatch-unused border-unused';
              el.title = `color${slot} — free`;
              el.innerHTML = `<span class="ansi" style="opacity:0.4">${slot}</span><span class="shade" style="opacity:0.3">free</span><span class="hex" style="opacity:0.2">—</span>`;
              row.appendChild(el);
            }
            container.appendChild(row);
            return;
          }

          const row = document.createElement('div');
          row.className = 'palette-row';

          const lbl = document.createElement('div');
          lbl.className = 'family-label';
          lbl.textContent = name;
          row.appendChild(lbl);

          const shadeLabels = familyTwShades || TW_SHADES;
          shades.forEach((hex, i) => {
            const slot = start + i;
            const tw = shadeLabels[i];
            const cls = textClass(hex);
            const isAnchor = anchorShades && anchorShades.includes(i);

            const el = document.createElement('div');
            el.className = `swatch ${cls}${isAnchor ? ' swatch-term-anchor' : ''}`;
            el.style.background = hex;
            const twLabel = tw.startsWith('term-') ? tw : `TW${tw}`;
            el.title = `color${slot}  ${hex}  (${name}-${i} / ${twLabel})`;
            el.innerHTML = `<span class="ansi">${slot}</span><span class="shade">s${i} / ${twLabel}</span><span class="hex">${hex}</span>`;
            row.appendChild(el);
          });

          container.appendChild(row);
        },
