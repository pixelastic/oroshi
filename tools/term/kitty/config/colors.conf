# Terminal colors {{{
# The 0-15 range is used by terminal colors.
# 0 = Black (Terminal background)    8  = Gray
# 1 = Red                            9  = Pink
# 2 = Green                          10 = Lime
# 3 = Yellow                         11 = Orange
# 4 = Blue                           12 = Indigo
# 5 = Purple                         13 = Fuchsia
# 6 = Cyan                           14 = Teal
# 7 = White                          15 = Stone
