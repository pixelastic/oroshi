# See https://sw.kovidgoyal.net/kitty/conf.html for full documentation

# Force aligning on top
placement_strategy top-left

# Stop warning about new versions
update_check_interval 0

# Allow "remote" control, to control kitty from other scripts
allow_remote_control yes

# Disable bell
enable_audio_bell no

include ~/.oroshi/tools/term/kitty/config/text.conf
include ~/.oroshi/tools/term/kitty/config/colors.conf
include ~/.oroshi/tools/term/kitty/config/windows.conf
include ~/.oroshi/tools/term/kitty/config/statusline.conf
include ~/.oroshi/tools/term/kitty/config/keybindings.conf
include ~/.oroshi/tools/term/kitty/config/icons.conf

include ~/.oroshi/tools/term/kitty/config/local/${HOSTNAME}.conf
